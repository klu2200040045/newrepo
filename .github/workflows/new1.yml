name: NDCe Windows Automation Setup
 
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
 
env:
  XFS_SIMULATOR_VERSION: '4.7.0'
  APTRA_ADVANCE_NDC_VERSION: '5.2.0'
  APTRA_ADVANCE_NDC_PATCH_BRANCH: ''
  EMV_VERSION: '5.0.0'
  NDC_ENTERPRISE_VERSION: 'andc52x-2.10.0-M01'
  AUTOMATION_BASE_TARF_VERSION: '1.1.6'
 
jobs:
  setup-and-test:
    name: NDCe Stack Deploy & Run Automation Tests
    runs-on: windows-latest
 
    steps:
      - name: Checkout ndce-automation-tests
        uses: actions/checkout@v4
        #with:
        #  repository: ncratleos-swt-banking/ndce-automation-tests
        #  ref: master
        #  token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
 
      - name: Print deployment configuration
        shell: pwsh
        run: |
          Write-Host "========================================="
          Write-Host "  NDCe Stack Deployment Configuration"
          Write-Host "========================================="
          Write-Host "Runner OS              : $env:OS - $((Get-CimInstance Win32_OperatingSystem).Caption)"
          Write-Host "XFS Simulator          : $env:XFS_SIMULATOR_VERSION"
          Write-Host "APTRA Advance NDC      : $env:APTRA_ADVANCE_NDC_VERSION"
          Write-Host "APTRA NDC Patch Branch : $env:APTRA_ADVANCE_NDC_PATCH_BRANCH"
          Write-Host "EMV Version            : $env:EMV_VERSION"
          Write-Host "NDC Enterprise         : $env:NDC_ENTERPRISE_VERSION"
          Write-Host "Automation Base TARF   : $env:AUTOMATION_BASE_TARF_VERSION"
          Write-Host "========================================="
 
      # -----------------------------------------------------------
      # 0. Install Prerequisites (Chocolatey, 7zip, NuGet, VC++)
      # -----------------------------------------------------------
      - name: Install prerequisites
        shell: pwsh
        run: |
          Write-Host "=== Installing prerequisites ==="
          choco install 7zip -y --no-progress
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\ndce-install\Packages" | Out-Null
          Write-Host "Install base path: $env:RUNNER_TEMP\ndce-install"
 
      
      # -----------------------------------------------------------
      # 1. Install NDCe Stack Components
      # -----------------------------------------------------------

      - name: Install XFS Simulator
        shell: pwsh
        run: |
          Write-Host "=== Downloading XFS Simulator $env:XFS_SIMULATOR_VERSION ==="
          $nupkgFile = "XFSSimulator.$env:XFS_SIMULATOR_VERSION.nupkg"
          $url = "https://ncratleos.jfrog.io/artifactory/atmclient-nuget-releases/$nupkgFile"
          curl.exe --fail -L -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" -o "$env:RUNNER_TEMP\ndce-install\Packages\$nupkgFile" $url
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: Download failed with exit code $LASTEXITCODE"
            exit 1
          }
          $fileSize = (Get-Item "$env:RUNNER_TEMP\ndce-install\Packages\$nupkgFile").Length
          Write-Host "Downloaded file size: $fileSize bytes"
          if ($fileSize -lt 1024) {
            Write-Host "ERROR: Downloaded file is too small ($fileSize bytes) — likely an error response:"
            Get-Content "$env:RUNNER_TEMP\ndce-install\Packages\$nupkgFile"
            exit 1
          }
          Write-Host "=== Extracting nupkg ==="
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\ndce-install\XFS Simulator" | Out-Null
          Expand-Archive -Path "$env:RUNNER_TEMP\ndce-install\Packages\$nupkgFile" -DestinationPath "$env:RUNNER_TEMP\ndce-install\XFS Simulator" -Force
          Write-Host "=== Installing XFS Simulator (setup.exe /t:devsim /u:silent) ==="
          $proc = Start-Process -FilePath "$env:RUNNER_TEMP\ndce-install\XFS Simulator\setup.exe" -ArgumentList "/t:devsim /u:silent" -Wait -PassThru
          $validCodes = @(0, 1073741825, 1073741826, 1073741830, 3010, 1641)
          if ($proc.ExitCode -notin $validCodes) {
            Write-Host "ERROR: XFS Simulator install failed with exit code $($proc.ExitCode)"
            exit 1
          }
          Write-Host "XFS Simulator installed (exit code: $($proc.ExitCode))"

      - name: Install APTRA Advance NDC - Download and Extract
        shell: pwsh
        run: |
          Write-Host "=== Downloading APTRA Advance NDC $env:APTRA_ADVANCE_NDC_VERSION ==="
          $nupkgFile = "AdvanceNDC.$env:APTRA_ADVANCE_NDC_VERSION.nupkg"
          $url = "https://ncratleos.jfrog.io/artifactory/atmclient-nuget-releases/$nupkgFile"
          curl.exe --fail -L -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" -o "$env:RUNNER_TEMP\ndce-install\Packages\$nupkgFile" $url
          if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: Download failed"; exit 1 }
          $fileSize = (Get-Item "$env:RUNNER_TEMP\ndce-install\Packages\$nupkgFile").Length
          Write-Host "Downloaded file size: $fileSize bytes"
          if ($fileSize -lt 1024) {
            Write-Host "ERROR: File too small ($fileSize bytes):"; Get-Content "$env:RUNNER_TEMP\ndce-install\Packages\$nupkgFile"; exit 1
          }
          Write-Host "=== Extracting Advance NDC ==="
          $extractPath = "$env:RUNNER_TEMP\ndce-install\Advance NDC $env:APTRA_ADVANCE_NDC_VERSION"
          New-Item -ItemType Directory -Force -Path $extractPath | Out-Null
          Expand-Archive -Path "$env:RUNNER_TEMP\ndce-install\Packages\$nupkgFile" -DestinationPath $extractPath -Force
          Write-Host "=== Extracted contents ==="
          Get-ChildItem -Path $extractPath -Recurse | Select-Object FullName, Length | Format-Table -AutoSize
          Write-Host "Setup.exe exists: $(Test-Path "$extractPath\setup.exe")"
          Write-Host "Extract path: $extractPath"
      
      
      - name: Install APTRA Advance NDC - Run Installer
        shell: pwsh
        run: |
            $basePath    = "$env:RUNNER_TEMP\ndce-install"
            $extractPath = "$basePath\Advance NDC $env:APTRA_ADVANCE_NDC_VERSION"
            $setupExe    = Join-Path $extractPath "setup.exe"
        
            if (-not (Test-Path $setupExe)) {
              Write-Error "setup.exe not found at expected path: $setupExe"
              exit 1
            }
        
            Write-Host "=== Pre-installation diagnostics ==="
            Write-Host "OS: $((Get-CimInstance Win32_OperatingSystem).Caption)"
            Write-Host "Free disk: $([math]::Round((Get-PSDrive C).Free / 1GB, 2)) GB"
            Write-Host "Running as: $env:USERNAME"
            Write-Host "Is Admin: $([Security.Principal.WindowsPrincipal]::new(
              [Security.Principal.WindowsIdentity]::GetCurrent()
            ).IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator))"
        
            Write-Host ""
            Write-Host "=== Installed NCR/APTRA components ==="
            Get-CimInstance Win32_Product |
              Where-Object { $_.Name -match 'NCR|APTRA|XFS' } |
              Select-Object Name, Version |
              Format-Table -AutoSize
        
            Write-Host ""
            Write-Host "=== Pending reboot check ==="
            $pendingRebootBefore = (
              Test-Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Component Based Servicing\RebootPending"
            ) -or (
              Test-Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\WindowsUpdate\Auto Update\RebootRequired"
            )
            Write-Host "Pending reboot before install: $pendingRebootBefore"
        
            Write-Host ""
            Write-Host "Waiting for system stability..."
            Start-Sleep -Seconds 15
        
            Write-Host ""
            Write-Host "=== Installing Advance NDC ==="
            Write-Host "Command: setup.exe /t:sst /u:silent"
            Write-Host "Start time: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
        
            & $setupExe /t:sst /u:silent
        
            Write-Host "End time: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
            Write-Host "NOTE: Advance NDC uses Aggregate Installer; exit code is not reliable."
        
            Write-Host ""
            Write-Host "Validating installation via Aggregate Installer event logs..."
            Start-Sleep -Seconds 10
        
            $aggSuccess = Get-WinEvent -FilterHashtable @{
              LogName      = 'Application'
              ProviderName = 'Aggregate Installer'
              StartTime    = (Get-Date).AddMinutes(-10)
            } | Where-Object {
              $_.Message -match 'Success entry' -and
              $_.Message -match 'APTRA Advance NDC'
            }
        
            if (-not $aggSuccess) {
              Write-Error "Aggregate Installer did not report successful execution for APTRA Advance NDC"
              exit 1
            }
        
            Write-Host "Aggregate Installer reported SUCCESS for Advance NDC"
        
            Write-Host ""
            Write-Host "Checking for pending reboot after installation..."
            $pendingRebootAfter = (
              Test-Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Component Based Servicing\RebootPending"
            ) -or (
              Test-Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\WindowsUpdate\Auto Update\RebootRequired"
            )
            Write-Host "Pending reboot after install: $pendingRebootAfter"
        
            Write-Host ""
            Write-Host "Verifying installation artefacts under Program Files"
        
            $installRoot = "C:\Program Files (x86)\NCR APTRA\Advance NDC"
            $expectedDirs = @("Bin", "Config", "Logs", "Terminal")
            $missingDirs  = @()
        
            if (-not (Test-Path $installRoot)) {
              Write-Host "Install root directory not present"
              $missingDirs += "InstallRoot"
            } else {
              Write-Host "Install root directory present"
            }
        
            foreach ($dir in $expectedDirs) {
              $path = Join-Path $installRoot $dir
              if (Test-Path $path) {
                Write-Host "Directory present: $dir"
              } else {
                Write-Host "Directory not present: $dir"
                $missingDirs += $dir
              }
            }
        
            if ($missingDirs.Count -gt 0) {
              Write-Host ""
              Write-Host "One or more installation components are not materialized"
              Write-Host "Installation requires system reboot to finalize deferred components"
        
              Write-Host ""
              Write-Host "Attempting reboot assessment"
        
              if ($env:GITHUB_ACTIONS -eq "true") {
                Write-Error "System reboot is required to complete APTRA Advance NDC installation"
                Write-Error "Reboot operation is not supported on GitHub-hosted Windows runners"
                Write-Error "Further installation verification cannot be performed in this environment"
                Write-Error  "A persistent, self-hosted Windows runner is required to proceed"

            exit 1
              }
              }
      

          
