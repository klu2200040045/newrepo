name: NDCe Windows Automation Setup (GitHub Hosted)

on:
  workflow_dispatch:
    inputs:
      xfs_simulator_version:
        required: true
        default: '4.7.0'
      aptra_advance_ndc_version:
        required: true
        default: '5.2.0'
      emv_version:
        required: true
        default: '5.0.0'
      ndc_enterprise_version:
        required: true
        default: 'andc52x-2.10.0-M01'
      automation_base_tarf_version:
        required: true
        default: '1.1.6'
      automation_ndc_enterprise_version:
        required: true
        default: '01.09.00Pre'

env:
  XFS_SIMULATOR_VERSION: ${{ inputs.xfs_simulator_version }}
  APTRA_ADVANCE_NDC_VERSION: ${{ inputs.aptra_advance_ndc_version }}
  EMV_VERSION: ${{ inputs.emv_version }}
  NDC_ENTERPRISE_VERSION: ${{ inputs.ndc_enterprise_version }}
  AUTOMATION_BASE_TARF_VERSION: ${{ inputs.automation_base_tarf_version }}
  AUTOMATION_NDC_ENTERPRISE_VERSION: ${{ inputs.automation_ndc_enterprise_version }}

jobs:
  setup-and-install:
    name: NDCe Stack Installation (GitHub Hosted)
    runs-on: windows-latest

    steps:
      - name: Print deployment configuration
        shell: pwsh
        run: |
          Write-Host "========================================="
          Write-Host "  NDCe Stack Deployment Configuration"
          Write-Host "========================================="
          Write-Host "Runner OS         : $((Get-CimInstance Win32_OperatingSystem).Caption)"
          Write-Host "XFS Simulator     : $env:XFS_SIMULATOR_VERSION"
          Write-Host "Advance NDC       : $env:APTRA_ADVANCE_NDC_VERSION"
          Write-Host "EMV Version       : $env:EMV_VERSION"
          Write-Host "NDC Enterprise    : $env:NDC_ENTERPRISE_VERSION"
          Write-Host "========================================="
      # -----------------------------------------------------------
      # 0. Prerequisites
      # -----------------------------------------------------------
      - name: Install prerequisites
        shell: pwsh
        run: |
           Write-Host "===Installing prrequisities ==="
           choco install 7zip -y --no-progress
           New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\ndce-install\Packages" | Out-Null
           Write-Host "Install base path: $env:RUNNER_TEMP\ndce-install"
       # -----------------------------------------------------------
    # 1. Install NDCe Stack Components
    # -----------------------------------------------------------
      - name: Install XFS Simulator
        shell: pwsh
        run: |
         Write-Host "=== Downloading XFS Simulator $env:XFS_SIMULATOR_VERSION ==="
         $nupkgFile = "XFSSimulator.$env:XFS_SIMULATOR_VERSION.nupkg"
         $downloadPath = "$env:RUNNER_TEMP\ndce-install\Packages\$nupkgFile"
         $extractPath  = "$env:RUNNER_TEMP\ndce-install\XFS Simulator"
         $url = "https://ncratleos.jfrog.io/artifactory/atmclient-nuget-releases/$nupkgFile"
         New-Item -ItemType Directory -Force -Path (Split-Path $downloadPath) | Out-Null
         # Download
           curl.exe --fail -L -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" -o $downloadPath $url
           
           if ($LASTEXITCODE -ne 0) {
             Write-Host "ERROR: Download failed with exit code $LASTEXITCODE"
             exit 1
           }
           
           Write-Host "Downloaded package path:"
           Write-Host $downloadPath
           
           $fileSize = (Get-Item $downloadPath).Length
           Write-Host "Downloaded file size: $fileSize bytes"
           
           if ($fileSize -lt 1024) {
             Write-Host "ERROR: Downloaded file is too small"
             exit 1
           }
           
           # Extract
           Write-Host "=== Extracting XFS Simulator nupkg ==="
           New-Item -ItemType Directory -Force -Path $extractPath | Out-Null
           Expand-Archive -Path $downloadPath -DestinationPath $extractPath -Force
           
           Write-Host "Top-level extracted contents:"
           Get-ChildItem $extractPath |
             Select-Object Name, Length, LastWriteTime |
             Format-Table -AutoSize
           
           # Locate setup.exe
           $setupExe = Join-Path $extractPath "setup.exe"
           Write-Host "setup.exe path : $setupExe"
           Write-Host "Exists        : $(Test-Path $setupExe)"
           
           # Install
           Write-Host "=== Installing XFS Simulator ==="
           $proc = Start-Process -FilePath $setupExe -ArgumentList "/t:devsim /u:silent" -Wait -PassThru
           
           $validCodes = @(0,1073741825,1073741826,1073741830,3010,1641)
           if ($proc.ExitCode -notin $validCodes) {
             Write-Host "ERROR: XFS Simulator install failed with exit code $($proc.ExitCode)"
             exit 1
           }
           
           Write-Host "XFS Simulator installed successfully (exit code: $($proc.ExitCode))"
           
           # Post-install verification
           Write-Host "=== Locating installed XFS Simulator executable (SIMSTART.exe) ==="
           $simStart = Get-ChildItem -Path "C:\" -Filter "SIMSTART.exe" -Recurse -ErrorAction SilentlyContinue |
                       Select-Object -First 1
           
           if (-not $simStart) {
             Write-Host "ERROR: SIMSTART.exe not found after installation"
             exit 1
           }
           
           Write-Host "SIMSTART.exe found:"
           Write-Host "Path : $($simStart.FullName)"
           Write-Host "Size : $([Math]::Round($simStart.Length / 1KB, 2)) KB"
           
           $ver = (Get-Item $simStart.FullName).VersionInfo
           Write-Host "File version : $($ver.FileVersion)"
           Write-Host "Product ver. : $($ver.ProductVersion)"
      - name: Install APTRA Advance NDC - Download and Extract
        shell: pwsh
        run: |
          Write-Host "=== Downloading APTRA Advance NDC $env:APTRA_ADVANCE_NDC_VERSION ==="
          $nupkgFile = "AdvanceNDC.$env:APTRA_ADVANCE_NDC_VERSION.nupkg"
          $url = "https://ncratleos.jfrog.io/artifactory/atmclient-nuget-releases/$nupkgFile"
          curl.exe --fail -L -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" -o "$env:RUNNER_TEMP\ndce-install\Packages\$nupkgFile" $url
          if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: Download failed"; exit 1 }
          $fileSize = (Get-Item "$env:RUNNER_TEMP\ndce-install\Packages\$nupkgFile").Length
          Write-Host "Downloaded file size: $fileSize bytes"
          if ($fileSize -lt 1024) {
            Write-Host "ERROR: File too small ($fileSize bytes):"; Get-Content "$env:RUNNER_TEMP\ndce-install\Packages\$nupkgFile"; exit 1
          }
          Write-Host "=== Extracting Advance NDC ==="
          $extractPath = "$env:RUNNER_TEMP\ndce-install\Advance NDC $env:APTRA_ADVANCE_NDC_VERSION"
          New-Item -ItemType Directory -Force -Path $extractPath | Out-Null
          Expand-Archive -Path "$env:RUNNER_TEMP\ndce-install\Packages\$nupkgFile" -DestinationPath $extractPath -Force
          Write-Host "=== Extracted contents ==="
          Get-ChildItem -Path $extractPath -Recurse | Select-Object FullName, Length | Format-Table -AutoSize
          Write-Host "Setup.exe exists: $(Test-Path "$extractPath\setup.exe")"
          Write-Host "Extract path: $extractPath"
      
      - name: Setup and install the APTRA Advance NDC aggregate
        shell: pwsh
        run: |
          $basePath    = "$env:RUNNER_TEMP\ndce-install"
          $extractPath = "$basePath\Advance NDC $env:APTRA_ADVANCE_NDC_VERSION"
          $setupExe    = Join-Path $extractPath "setup.exe"
      
          if (-not (Test-Path $setupExe)) {
            Write-Error "setup.exe not found at expected location: $setupExe"
            exit 1
          }
      
          Write-Host "Starting APTRA Advance NDC aggregate installation"
          Write-Host "Command: setup.exe /t:sst /u:silent"
      
          # Allow system to stabilize before invoking installer
          Start-Sleep -Seconds 15
      
          & $setupExe /t:sst /u:silent
      
          Write-Host "APTRA Advance NDC aggregate installation invoked"

      - name: Validate APTRA Advance NDC aggregate execution
        shell: pwsh
        run: |
          Write-Host "Validating Aggregate Installer execution status"
      
          Start-Sleep -Seconds 10
      
          $aggSuccess = Get-WinEvent -FilterHashtable @{
            LogName      = 'Application'
            ProviderName = 'Aggregate Installer'
            StartTime    = (Get-Date).AddMinutes(-10)
          } | Where-Object {
            $_.Message -match 'Success entry' -and
            $_.Message -match 'APTRA Advance NDC'
          }
      
          if (-not $aggSuccess) {
            Write-Error "Aggregate Installer did not report successful execution for APTRA Advance NDC"
            exit 1
          }
      
          Write-Host "Aggregate Installer reported successful execution for APTRA Advance NDC"

      - name: Verify APTRA Advance NDC installation artefacts
        shell: pwsh
        run: |
          Write-Host "Verifying APTRA Advance NDC installation artefacts"
      
          $installRoot = "C:\Program Files (x86)\NCR APTRA\Advance NDC"
          $expectedDirs = @("Bin", "Config", "Logs", "Terminal")
      
          if (Test-Path $installRoot) {
            Write-Host "Install root directory present: $installRoot"
          } else {
            Write-Host "Install root directory not present at this stage"
          }
      
          $missingDirs = @()
          foreach ($dir in $expectedDirs) {
            $path = Join-Path $installRoot $dir
            if (Test-Path $path) {
              Write-Host "Directory present: $dir"
            } else {
              Write-Host "Directory not present: $dir"
              $missingDirs += $dir
            }
          }
      
          if ($missingDirs.Count -eq 0) {
            Write-Host "All expected APTRA Advance NDC directories are present"
            echo "INSTALL_STATE=FINALIZED" >> $env:GITHUB_ENV
          } else {
            Write-Host "One or more APTRA Advance NDC directories are not present"
            echo "INSTALL_STATE=PENDING_REBOOT" >> $env:GITHUB_ENV
          }

      - name: Assess reboot requirement and execution constraints
        shell: pwsh
        run: |
          Write-Host "Assessing reboot requirement"
      
          $rebootPending = (
            Test-Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Component Based Servicing\RebootPending"
          ) -or (
            Test-Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\WindowsUpdate\Auto Update\RebootRequired"
          )
      
          Write-Host "Pending reboot detected: $rebootPending"
      
          if ($env:INSTALL_STATE -eq "PENDING_REBOOT") {
            Write-Host "APTRA Advance NDC installation requires system reboot for completion"
            Write-Host "Reboot operation is not supported on GitHub-hosted runners"
            Write-Host "Further validation must be performed on a persistent self-hosted Windows runner"
          } else {
            Write-Host "APTRA Advance NDC installation is complete without reboot requirement"
          }
