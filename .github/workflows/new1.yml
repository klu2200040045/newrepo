name: NDCe Windows Automation Setup
 
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
 
env:
  XFS_SIMULATOR_VERSION: '4.7.0'
  APTRA_ADVANCE_NDC_VERSION: '5.2.0'
  APTRA_ADVANCE_NDC_PATCH_BRANCH: ''
  EMV_VERSION: '5.0.0'
  NDC_ENTERPRISE_VERSION: 'andc52x-2.10.0-M01'
  AUTOMATION_BASE_TARF_VERSION: '1.1.6'
  CONNECTIONS_SERVER_URL: 'http://153.81.244.117:8092/connections'
  PROJECT_TYPE: 'Reference'
  AUTOMATION_NDC_ENTERPRISE_VERSION: '01.09.00Pre'
  TEST_SUITE: 'BuilderTestSuite/Functional/ClientEditorPortal/clientEditorandPortal.robot'
  BROWSER: 'chromium'
 
jobs:
  setup-and-test:
    name: NDCe Stack Deploy & Run Automation Tests
    # Use self-hosted runner for ATM stack installation (requires interactive desktop session)
    # Change to 'windows-latest' for GitHub-hosted runner (not recommended for APTRA installs)
    runs-on: windows-latest
 
    steps:
      - name: Checkout ndce-automation-tests
        uses: actions/checkout@v4
      
      - name: Print deployment configuration
        shell: pwsh
        run: |
          Write-Host "========================================="
          Write-Host "  NDCe Stack Deployment Configuration"
          Write-Host "========================================="
          Write-Host "Runner OS              : $env:OS - $((Get-CimInstance Win32_OperatingSystem).Caption)"
          Write-Host "XFS Simulator          : $env:XFS_SIMULATOR_VERSION"
          Write-Host "APTRA Advance NDC      : $env:APTRA_ADVANCE_NDC_VERSION"
          Write-Host "APTRA NDC Patch Branch : $env:APTRA_ADVANCE_NDC_PATCH_BRANCH"
          Write-Host "EMV Version            : $env:EMV_VERSION"
          Write-Host "NDC Enterprise         : $env:NDC_ENTERPRISE_VERSION"
          Write-Host "Automation Base TARF   : $env:AUTOMATION_BASE_TARF_VERSION"
          Write-Host "Connections Server URL  : $env:CONNECTIONS_SERVER_URL"
          Write-Host "Project Type           : $env:PROJECT_TYPE"
          Write-Host "Automation NDCe Version: $env:AUTOMATION_NDC_ENTERPRISE_VERSION"
          Write-Host "========================================="
 
      # -----------------------------------------------------------
      # 0. Install Prerequisites (Chocolatey, 7zip, NuGet, VC++)
      # -----------------------------------------------------------
      - name: Install prerequisites
        shell: pwsh
        run: |
          Write-Host "=== Installing prerequisites ==="
          choco install 7zip -y --no-progress
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\ndce-install\Packages" | Out-Null
          Write-Host "Install base path: $env:RUNNER_TEMP\ndce-install"
 
    

       - name: Install APTRA Advance NDC - Download and Extract
        shell: pwsh
        run: |
          Write-Host "=== Downloading APTRA Advance NDC $env:APTRA_ADVANCE_NDC_VERSION ==="
          $nupkgFile = "AdvanceNDC.$env:APTRA_ADVANCE_NDC_VERSION.nupkg"
          $url = "https://ncratleos.jfrog.io/artifactory/atmclient-nuget-releases/$nupkgFile"
          curl.exe --fail -L -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" -o "$env:RUNNER_TEMP\ndce-install\Packages\$nupkgFile" $url
          if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: Download failed"; exit 1 }
          $fileSize = (Get-Item "$env:RUNNER_TEMP\ndce-install\Packages\$nupkgFile").Length
          Write-Host "Downloaded file size: $fileSize bytes"
          if ($fileSize -lt 1024) {
            Write-Host "ERROR: File too small ($fileSize bytes):"; Get-Content "$env:RUNNER_TEMP\ndce-install\Packages\$nupkgFile"; exit 1
          }
          Write-Host "=== Extracting Advance NDC ==="
          $extractPath = "$env:RUNNER_TEMP\ndce-install\Advance NDC $env:APTRA_ADVANCE_NDC_VERSION"
          New-Item -ItemType Directory -Force -Path $extractPath | Out-Null
          Expand-Archive -Path "$env:RUNNER_TEMP\ndce-install\Packages\$nupkgFile" -DestinationPath $extractPath -Force
          Write-Host "=== Extracted contents ==="
          Get-ChildItem -Path $extractPath -Recurse | Select-Object FullName, Length | Format-Table -AutoSize
          Write-Host "Setup.exe exists: $(Test-Path "$extractPath\setup.exe")"
          Write-Host "Extract path: $extractPath"

      - name: Install APTRA Advance NDC - Run Installer
        shell: pwsh
        run: |
          $extractPath = "$env:RUNNER_TEMP\ndce-install\Advance NDC $env:APTRA_ADVANCE_NDC_VERSION"
          $setupExe = Join-Path $extractPath "setup.exe"
          if (-not (Test-Path $setupExe)) {
            Write-Host "ERROR: setup.exe not found at $setupExe"; exit 1
          }

          # --- Pre-checks ---
          Write-Host "=== Pre-installation diagnostics ==="
          Write-Host "OS: $((Get-CimInstance Win32_OperatingSystem).Caption)"
          Write-Host "Free disk: $([math]::Round((Get-PSDrive C).Free / 1GB, 2)) GB"
          Write-Host "Running as: $env:USERNAME"
          Write-Host "Is Admin: $([Security.Principal.WindowsPrincipal]::new([Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator))"

          # Check .NET Framework versions
          Write-Host "=== .NET Framework versions ==="
          Get-ChildItem 'HKLM:\SOFTWARE\Microsoft\NET Framework Setup\NDP' -Recurse | 
            Get-ItemProperty -Name Version, Release -ErrorAction SilentlyContinue |
            Where-Object { $_.PSChildName -match '^(?!S)\p{L}'} |
            Select-Object PSChildName, Version, Release | Format-Table -AutoSize

          # Check if XFS Simulator is installed
          Write-Host "=== Installed products (NCR/APTRA) ==="
          Get-CimInstance Win32_Product | Where-Object { $_.Name -match 'NCR|APTRA|XFS' } | Select-Object Name, Version | Format-Table -AutoSize

          # Check for pending reboot (XFS installer may require one)
          Write-Host "=== Pending reboot check ==="
          $pendingReboot = (Test-Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Component Based Servicing\RebootPending") -or
                           (Test-Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\WindowsUpdate\Auto Update\RebootRequired")
          Write-Host "Pending reboot: $pendingReboot"

          # Enable global MSI verbose logging
          Write-Host "=== Enabling MSI verbose logging ==="
          New-Item -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\Installer" -Force | Out-Null
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\Installer" -Name "Logging" -Value "voicewarmupx" -Type String
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\Installer" -Name "Debug" -Value 7 -Type DWord

          # List contents of extract path for verification
          Write-Host "=== Extract directory contents (top-level) ==="
          Get-ChildItem -Path $extractPath | Format-Table Name, Length -AutoSize

          Write-Host "=== Installing Advance NDC ==="
          Write-Host "Command: $setupExe /t:sst /u:silent"
          Write-Host "Start time: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"

          & $setupExe /t:sst /u:silent
          $exitCode = $LASTEXITCODE

          Write-Host "End time: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
          Write-Host "Exit code: $exitCode"

          # --- Post-install diagnostics ---
          # Check MSI logs in TEMP
          Write-Host "=== MSI logs in TEMP ==="
          $msiLogs = Get-ChildItem -Path $env:TEMP -Filter "MSI*.LOG" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 5
          if ($msiLogs) {
            foreach ($log in $msiLogs) {
              Write-Host "--- $($log.Name) ($($log.Length) bytes, $($log.LastWriteTime)) ---"
              Get-Content $log.FullName -Tail 150
            }
          } else {
            Write-Host "No MSI logs found in $env:TEMP"
          }

          # Check any log files created in the extract path
          Write-Host "=== Log files in extract path ==="
          Get-ChildItem -Path $extractPath -Filter "*.log" -Recurse -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "--- $($_.FullName) ---"
            Get-Content $_.FullName -Tail 100
          }

          # Check Windows Event Log
          Write-Host "=== Recent Application events (last 10 min) ==="
          Get-WinEvent -FilterHashtable @{LogName='Application'; StartTime=(Get-Date).AddMinutes(-10)} -MaxEvents 20 -ErrorAction SilentlyContinue | 
            Where-Object { $_.Message -match 'NCR|APTRA|setup|install|msi|error' } |
            Format-List TimeCreated, ProviderName, Message

          # Check Setup event log
          Write-Host "=== Recent Setup events ==="
          Get-WinEvent -LogName 'Setup' -MaxEvents 10 -ErrorAction SilentlyContinue | Format-List TimeCreated, Message

          $validCodes = @(0, 1073741825, 1073741826, 1073741830, 3010, 1641)
          if ($exitCode -notin $validCodes) {
            Write-Host "ERROR: Advance NDC install failed with exit code $exitCode"
            exit 1
          }
          Write-Host "Advance NDC installed successfully"