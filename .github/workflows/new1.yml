name: NDCe Stack Installation (GitHub Hosted)

on:
  workflow_dispatch:
    inputs:
      xfs_simulator_version:
        required: true
        default: '4.7.0'
      aptra_advance_ndc_version:
        required: true
        default: '5.2.0'
      emv_version:
        required: true
        default: '5.0.0'
      ndc_enterprise_version:
        required: true
        default: 'andc52x-2.10.0-M01'
      automation_base_tarf_version:
        required: true
        default: '1.1.6'
      automation_ndc_enterprise_version:
        required: true
        default: '01.09.00Pre'

jobs:
  stack-install:
    runs-on: windows-latest

    steps:
      - name: Set runtime variables
        shell: pwsh
        run: |
          echo "INSTALL_ROOT=$env:RUNNER_TEMP\ndce-install" >> $env:GITHUB_ENV
          echo "PACKAGE_DIR=$env:RUNNER_TEMP\ndce-install\Packages" >> $env:GITHUB_ENV
          echo "VALID_EXIT_CODES=0,1073741825,1073741826,1073741830,3010,1641" >> $env:GITHUB_ENV

      - name: Verify variables
        shell: pwsh
        run: |
          Write-Host "INSTALL_ROOT=$env:INSTALL_ROOT"
          Write-Host "PACKAGE_DIR=$env:PACKAGE_DIR"
          Write-Host "VALID_EXIT_CODES=$env:VALID_EXIT_CODES"

      # ------------------------------------------------------------
      # Create required directories (IMPORTANT)
      # ------------------------------------------------------------
      - name: Create install directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:INSTALL_ROOT | Out-Null
          New-Item -ItemType Directory -Force -Path $env:PACKAGE_DIR | Out-Null

      # ------------------------------------------------------------
      # XFS Simulator
      # ------------------------------------------------------------
      - name: Install XFS Simulator
        shell: pwsh
        run: |
          $ver = "${{ inputs.xfs_simulator_version }}"
          $pkg = "XFSSimulator.$ver.nupkg"
          $url = "https://ncratleos.jfrog.io/artifactory/atmclient-nuget-releases/$pkg"
          $dest = "$env:PACKAGE_DIR\$pkg"

          curl.exe -f -L -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" -o $dest $url
          if (-not (Test-Path $dest)) { Write-Host "Download failed"; exit 1 }
          if ((Get-Item $dest).Length -lt 1024) { Write-Host "File too small"; exit 1 }

          $extract = "$env:INSTALL_ROOT\XFS Simulator"
          New-Item -ItemType Directory -Force -Path $extract | Out-Null
          Expand-Archive $dest $extract -Force

          $proc = Start-Process "$extract\setup.exe" "/t:devsim /u:silent" -Wait -PassThru
          $validCodes = $env:VALID_EXIT_CODES.Split(',') | ForEach-Object { [int]$_ }
          if ($validCodes -notcontains $proc.ExitCode) {
            Write-Host "XFS install failed with exit code $($proc.ExitCode)"
            exit 1
          }

      # ------------------------------------------------------------
      # Advance NDC
      # ------------------------------------------------------------
      - name: Install APTRA Advance NDC
        shell: pwsh
        run: |
          $ver = "${{ inputs.aptra_advance_ndc_version }}"
          $pkg = "AdvanceNDC.$ver.nupkg"
          $url = "https://ncratleos.jfrog.io/artifactory/atmclient-nuget-releases/$pkg"
          $dest = "$env:PACKAGE_DIR\$pkg"

          curl.exe -f -L -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" -o $dest $url
          if (-not (Test-Path $dest)) { Write-Host "Download failed"; exit 1 }
          if ((Get-Item $dest).Length -lt 1024) { Write-Host "File too small"; exit 1 }

          $extract = "$env:INSTALL_ROOT\Advance NDC $ver"
          New-Item -ItemType Directory -Force -Path $extract | Out-Null
          Expand-Archive $dest $extract -Force

          $proc = Start-Process "$extract\setup.exe" "/t:sst /u:silent" -Wait -PassThru
          $validCodes = $env:VALID_EXIT_CODES.Split(',') | ForEach-Object { [int]$_ }
          if ($validCodes -notcontains $proc.ExitCode) {
            Write-Host "Advance NDC install failed with exit code $($proc.ExitCode)"
            exit 1
          }

      # ------------------------------------------------------------
      # EMV
      # ------------------------------------------------------------
      - name: Install EMV
        shell: pwsh
        run: |
          $ver = "${{ inputs.emv_version }}"
          $pkg = "EMVAdvanceNDC.$ver.nupkg"
          $url = "https://ncratleos.jfrog.io/artifactory/atmclient-nuget-releases/$pkg"
          $dest = "$env:PACKAGE_DIR\$pkg"

          curl.exe -f -L -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" -o $dest $url
          if ((Get-Item $dest).Length -lt 1024) { exit 1 }

          $extract = "$env:INSTALL_ROOT\EMV $ver"
          Expand-Archive $dest $extract -Force

          Start-Process msiexec.exe "/i `"$extract\EMVExMV.msi`" /qn /norestart" -Wait

      # ------------------------------------------------------------
      # NDC Enterprise
      # ------------------------------------------------------------
      - name: Install NDC Enterprise
        shell: pwsh
        run: |
          $ver = "${{ inputs.ndc_enterprise_version }}"

          if ($ver -match '^andc') {
            $url = "https://ncratleos.jfrog.io/artifactory/ndce-maven-snapshots/com/ncr/ndce/terminal/ndce-sst-aggregate-for-$ver/$ver-SNAPSHOT/ndce-sst-aggregate-for-$ver-SNAPSHOT.zip"
            $file = "ndce-$ver.zip"
          } else {
            $url = "https://ncratleos.jfrog.io/artifactory/atmclient-maven-releases/NDCEnterprise_SST_Runtime/$ver/NDCEnterprise_SST_Runtime-$ver.cab"
            $file = "ndce-$ver.cab"
          }

          $dest = "$env:PACKAGE_DIR\$file"
          curl.exe -f -L -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" -o $dest $url
          if ((Get-Item $dest).Length -lt 1024) { exit 1 }

          $extract = "$env:INSTALL_ROOT\NDC Enterprise $ver"
          New-Item -ItemType Directory -Force -Path $extract | Out-Null

          if ($file -like "*.cab") { expand $dest -F:* $extract }
          else { Expand-Archive $dest $extract -Force }

          $proc = Start-Process "$extract\setup.exe" "/t:sst /u:silent" -Wait -PassThru
          if ($env:VALID_EXIT_CODES.Split(',') -notcontains $proc.ExitCode) { exit 1 }

      # ------------------------------------------------------------
      # Automation Base TARF
      # ------------------------------------------------------------
      - name: Install Automation Base TARF
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\TARF\libraries | Out-Null
          pip install robotframework winregistry beautifulsoup4 lxml robotframework-requests

      # ------------------------------------------------------------
      # Automation for NDC Enterprise
      # ------------------------------------------------------------
      - name: Install Automation for NDC Enterprise
        shell: pwsh
        run: |
          $ver = "${{ inputs.automation_ndc_enterprise_version }}"
          $pkg = "NDCAutomation${ver}Release.nupkg"
          $url = "https://ncratleos.jfrog.io/artifactory/atmclient-nuget-releases/$pkg"
          $dest = "$env:PACKAGE_DIR\$pkg"

          curl.exe -f -L -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" -o $dest $url
          if ((Get-Item $dest).Length -lt 1024) { exit 1 }

          $extract = "$env:INSTALL_ROOT\ANDCAutomation $ver"
          Expand-Archive $dest $extract -Force

          Start-Process msiexec.exe "/i `"$extract\ANDCAutomation.msi`" /qn" -Wait

      - name: Stack Installation Complete
        run: echo "✅ NDCe stack installation completed successfully"
